name: Release - CI
on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'mkdocs.yml'
      - 'src/docs/**/*'
    tags: 
      - 'v*.*.*'

permissions:
  contents: read
  packages: write
env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
jobs:
  nuget_audit:
    runs-on: ubuntu-latest
    name: NuGet Audit
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x
    - name: Audit NuGet packages
      run: |
        dotnet restore ./CrestApps.Core.slnx -warnaserror /p:TreatWarningsAsErrors=true /p:NuGetAudit=true

  test:
    needs: nuget_audit
    runs-on: ${{ matrix.os }}
    name: Build, Test, Deploy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
    - name: Get the version
      id: get_version
      run: |
         # Strip leading 'v' if present
         VERSION="${GITHUB_REF_NAME#v}"
         echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      shell: bash
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: "20"
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x
    - name: Set build number 
      if: matrix.os == 'ubuntu-latest'
      run: echo "BuildNumber=$(( $GITHUB_RUN_NUMBER ))" >> $GITHUB_ENV
    - name: Build
      # NuGet auditing runs in the dedicated audit job above so dependency issues fail fast in one predictable place.
      run: |
        dotnet build -c Release -warnaserror /p:TreatWarningsAsErrors=true /p:RunAnalyzers=true /p:NuGetAudit=false -p:Version=${{ steps.get_version.outputs.VERSION }}
    - name: Unit Tests
      run: |
        dotnet test -c Release --no-build ./tests/CrestApps.Core.Tests/CrestApps.Core.Tests.csproj 
    - name: Deploy release NuGet packages
      if: matrix.os == 'ubuntu-latest'
      run: |
        dotnet pack -c Release --no-build -p:Version=${{ steps.get_version.outputs.VERSION }} -p:TreatWarningsAsErrors=false
        dotnet nuget push './src/**/*.nupkg' -t 600 -k ${{secrets.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json --skip-duplicate
