name: PR - CI
on: 
  pull_request:
    branches: [ main, release/** ]
permissions:
  contents: read
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
jobs:
  nuget_audit:
    runs-on: ubuntu-latest
    name: NuGet Audit
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x
    - name: Audit NuGet packages
      run: |
        dotnet restore ./CrestApps.Core.slnx -warnaserror /p:TreatWarningsAsErrors=true /p:NuGetAudit=true

  build_test:
    needs: nuget_audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    name: Build & Test
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: "20"
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.0.x
    - name: Build
      # NuGet auditing runs in the dedicated audit job above so dependency issues fail fast in one predictable place.
      run: |
        dotnet build -c Release -warnaserror /p:TreatWarningsAsErrors=true /p:RunAnalyzers=true /p:NuGetAudit=false
    - name: Unit Tests
      run: |
        dotnet test -c Release --no-build ./tests/CrestApps.Core.Tests/CrestApps.Core.Tests.csproj 
